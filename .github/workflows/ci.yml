name: CI

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Cache Bun download cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-cache-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-cache-${{ runner.os }}-

      - name: Install dependencies
        env:
          HUSKY: "0"
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format:check

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-24.04
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Cache Bun download cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-cache-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-cache-${{ runner.os }}-

      - name: Install dependencies
        env:
          HUSKY: "0"
        run: bun install --frozen-lockfile

      - name: Run frontend tests
        run: bun run --filter @smartfinance/frontend test

  test:
    name: Backend Tests (≥70% coverage)
    runs-on: ubuntu-24.04
    needs: lint

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: smartfinance_test
          POSTGRES_USER: smartfinance
          POSTGRES_PASSWORD: smartfinance
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U smartfinance"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://smartfinance:smartfinance@localhost:5433/smartfinance_test

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Cache Bun download cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-cache-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-cache-${{ runner.os }}-

      - name: Install dependencies
        env:
          HUSKY: "0"
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun --bun run prisma generate
        working-directory: backend

      - name: Run backend tests with coverage
        run: bun run --filter @smartfinance/backend test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 7

  build:
    name: Build (frontend + backend)
    runs-on: ubuntu-24.04
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Cache Bun download cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-cache-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-cache-${{ runner.os }}-

      - name: Install dependencies
        env:
          HUSKY: "0"
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: DATABASE_URL="postgresql://localhost:5432/dummy" bun --bun run prisma generate
        working-directory: backend

      - name: Build frontend
        run: bun run --filter @smartfinance/frontend build

      - name: Build backend
        run: bun run --filter @smartfinance/backend build

  docker-verify:
    name: Verify Docker Infrastructure
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify Docker Compose Build
        env:
          DOMAIN: "example.com"
          ACME_EMAIL: "test@example.com"
          POSTGRES_PASSWORD: "dummy_password"
          SESSION_SECRET: "dummy_secret"
        run: |
          echo "Testing Docker infrastructure..."
          docker compose build
