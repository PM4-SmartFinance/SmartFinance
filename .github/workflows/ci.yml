name: CI

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop

permissions:
  contents: write
  pull-requests: write

jobs:
  commit-msg-validation:
    name: Validate Commit Messages
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Test commit message regex (regression)
        run: bash scripts/test-commit-msg.sh

      - name: Enforce format on PR commits
        if: github.event_name == 'pull_request'
        run: |
          PATTERN=$(grep "^pattern=" .husky/commit-msg | sed "s/^pattern='//" | sed "s/'$//")
          FAILED=0
          while IFS= read -r msg; do
            [ -z "$msg" ] && continue
            case "$msg" in Merge*|Revert*) continue ;; esac
            if ! echo "$msg" | grep -qE "$PATTERN"; then
              echo "INVALID: $msg"
              FAILED=1
            fi
          done < <(git log "origin/${{ github.base_ref }}..HEAD" --format=%s)
          exit $FAILED
        shell: bash

  lint:
    name: Lint & Format
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Cache Bun download cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-cache-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-cache-${{ runner.os }}-

      - name: Install dependencies
        env:
          HUSKY: "0"
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format:check

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-24.04
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Cache Bun download cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-cache-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-cache-${{ runner.os }}-

      - name: Install dependencies
        env:
          HUSKY: "0"
        run: bun install --frozen-lockfile

      - name: Run frontend tests
        run: bun run --filter @smartfinance/frontend test:coverage

      - name: Upload frontend coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 7

  test:
    name: Backend Tests (≥70% coverage)
    runs-on: ubuntu-24.04
    needs: lint

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: smartfinance_test
          POSTGRES_USER: smartfinance
          POSTGRES_PASSWORD: smartfinance
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U smartfinance"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://smartfinance:smartfinance@localhost:5433/smartfinance_test

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Cache Bun download cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-cache-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-cache-${{ runner.os }}-

      - name: Install dependencies
        env:
          HUSKY: "0"
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun --bun run prisma generate
        working-directory: backend

      - name: Run backend tests with coverage
        run: bun run --filter @smartfinance/backend test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 7

      # NOTE: coverage reporting and badge generation has been moved to
      # the `coverage-report` job which waits for both frontend and backend
      # test jobs to complete. This avoids race conditions where frontend
      # artifacts are not yet available when the backend job posts the PR comment.

  build:
    name: Build (frontend + backend)
    runs-on: ubuntu-24.04
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Cache Bun download cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-cache-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-cache-${{ runner.os }}-

      - name: Install dependencies
        env:
          HUSKY: "0"
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: DATABASE_URL="postgresql://localhost:5432/dummy" bun --bun run prisma generate
        working-directory: backend

      - name: Build frontend
        run: bun run --filter @smartfinance/frontend build

      - name: Build backend
        run: bun run --filter @smartfinance/backend build

  docker-verify:
    name: Verify Docker Infrastructure
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify Docker Compose Build
        env:
          DOMAIN: "example.com"
          ACME_EMAIL: "test@example.com"
          POSTGRES_PASSWORD: "dummy_password"
          SESSION_SECRET: "dummy_secret"
        run: |
          echo "Testing Docker infrastructure..."
          docker compose build

  coverage-report:
    name: Coverage Report
    runs-on: ubuntu-24.04
    needs:
      - test-frontend
      - test
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: artifacts/frontend

      - name: Download backend coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: artifacts/backend

      - name: Install jq and bc
        run: sudo apt-get update && sudo apt-get install -y jq bc

      - name: Generate and post coverage report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number || '' }}
        run: |
          set -euo pipefail
          # locate coverage-summary.json files
          BACK_SUM=$(find artifacts -type f -name coverage-summary.json | grep backend || true)
          FRONT_SUM=$(find artifacts -type f -name coverage-summary.json | grep frontend || true)

          # build markdown
          echo "## Test Coverage Report" > /tmp/coverage_report.md
          echo "" >> /tmp/coverage_report.md
          echo "| Module | Current | Baseline | Delta |" >> /tmp/coverage_report.md
          echo "|--------|---------|----------|-------|" >> /tmp/coverage_report.md

          if [ -n "$BACK_SUM" ] && [ -f "$BACK_SUM" ]; then
            BACK_CUR=$(jq -r '.total.lines.pct' "$BACK_SUM")
            if [ -f coverage/baseline-backend-summary.json ]; then
              BACK_BASE=$(jq -r '.total.lines.pct' coverage/baseline-backend-summary.json)
              BACK_DELTA=$(printf "%.2f" "$(echo "$BACK_CUR - $BACK_BASE" | bc -l)")
              echo "| Backend | $BACK_CUR% | $BACK_BASE% | $BACK_DELTA% |" >> /tmp/coverage_report.md
            else
              echo "| Backend | $BACK_CUR% | - | - |" >> /tmp/coverage_report.md
            fi
          fi

          if [ -n "$FRONT_SUM" ] && [ -f "$FRONT_SUM" ]; then
            FRONT_CUR=$(jq -r '.total.lines.pct' "$FRONT_SUM")
            if [ -f coverage/baseline-frontend-summary.json ]; then
              FRONT_BASE=$(jq -r '.total.lines.pct' coverage/baseline-frontend-summary.json)
              FRONT_DELTA=$(printf "%.2f" "$(echo "$FRONT_CUR - $FRONT_BASE" | bc -l)")
              echo "| Frontend | $FRONT_CUR% | $FRONT_BASE% | $FRONT_DELTA% |" >> /tmp/coverage_report.md
            else
              echo "| Frontend | $FRONT_CUR% | - | - |" >> /tmp/coverage_report.md
            fi
          fi

          if [ -n "$BACK_SUM" ] && [ -f "$BACK_SUM" ]; then
            echo "" >> /tmp/coverage_report.md
            echo "#### Backend Per-File Coverage" >> /tmp/coverage_report.md
            jq -r 'to_entries[] | select(.key != "total") | "- **\(.key)**: \(.value.lines.pct)%"' "$BACK_SUM" | head -20 >> /tmp/coverage_report.md || true
          fi

          if [ -n "$FRONT_SUM" ] && [ -f "$FRONT_SUM" ]; then
            echo "" >> /tmp/coverage_report.md
            echo "#### Frontend Per-File Coverage" >> /tmp/coverage_report.md
            jq -r 'to_entries[] | select(.key != "total") | "- **\(.key)**: \(.value.lines.pct)%"' "$FRONT_SUM" | head -20 >> /tmp/coverage_report.md || true
          fi

          # post if PR
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            body=$(cat /tmp/coverage_report.md)
            payload=$(jq -n --arg body "$body" '{body: $body}')
            curl -s -H "Authorization: token $GITHUB_TOKEN" -H "Content-Type: application/json" --data "$payload" "https://api.github.com/repos/$REPO/issues/${{ github.event.pull_request.number }}/comments"
          fi

      - name: Generate badges and update baselines (on develop push)
        if: github.ref == 'refs/heads/develop' && success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p coverage
          # copy summaries if present
          if [ -f artifacts/backend/coverage/coverage-summary.json ]; then
            cp artifacts/backend/coverage/coverage-summary.json coverage/baseline-backend-summary.json
          fi
          if [ -f artifacts/frontend/coverage/coverage-summary.json ]; then
            cp artifacts/frontend/coverage/coverage-summary.json coverage/baseline-frontend-summary.json
          fi
          # derive percentages
          back_pct=0
          front_pct=0
          if [ -f coverage/baseline-backend-summary.json ]; then
            back_pct=$(jq -r '.total.lines.pct' coverage/baseline-backend-summary.json)
          fi
          if [ -f coverage/baseline-frontend-summary.json ]; then
            front_pct=$(jq -r '.total.lines.pct' coverage/baseline-frontend-summary.json)
          fi
          cat > backend-coverage-badge.svg <<EOF
          <svg xmlns="http://www.w3.org/2000/svg" width="140" height="20">
            <rect width="70" height="20" fill="#555" />
            <rect x="70" width="70" height="20" fill="#4c1" />
            <g fill="#fff" text-anchor="middle" font-family="Verdana" font-size="11">
              <text x="35" y="14">backend</text>
              <text x="105" y="14">${back_pct}%</text>
            </g>
          </svg>
          EOF

          cat > frontend-coverage-badge.svg <<EOF
          <svg xmlns="http://www.w3.org/2000/svg" width="140" height="20">
            <rect width="70" height="20" fill="#555" />
            <rect x="70" width="70" height="20" fill="#4c1" />
            <g fill="#fff" text-anchor="middle" font-family="Verdana" font-size="11">
              <text x="35" y="14">frontend</text>
              <text x="105" y="14">${front_pct}%</text>
            </g>
          </svg>
          EOF

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add coverage/baseline-backend-summary.json coverage/baseline-frontend-summary.json backend-coverage-badge.svg frontend-coverage-badge.svg || true
          git remote set-url origin https://${GITHUB_TOKEN}@github.com/${REPO}.git
          if git commit -m "chore(ci): update coverage baselines and badges [skip ci]"; then
            git push origin develop
          else
            echo "No baseline changes to commit"
          fi
