name: CI

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            frontend/node_modules
            backend/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        env:
          HUSKY: "0"
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format:check

  test:
    name: Backend Tests (≥70% coverage)
    runs-on: ubuntu-24.04
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            frontend/node_modules
            backend/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        env:
          HUSKY: "0"
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: DATABASE_URL="postgresql://localhost:5432/dummy" bun --bun run prisma generate
        working-directory: backend

      - name: Run backend tests with coverage
        run: bun run --filter @smartfinance/backend test

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 7

  build:
    name: Build (frontend + backend)
    runs-on: ubuntu-24.04
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            frontend/node_modules
            backend/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        env:
          HUSKY: "0"
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: DATABASE_URL="postgresql://localhost:5432/dummy" bun --bun run prisma generate
        working-directory: backend

      - name: Build frontend
        run: bun run --filter @smartfinance/frontend build

      - name: Build backend
        run: bun run --filter @smartfinance/backend build

  docker-verify:
    name: Verify Docker Infrastructure
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify Docker Compose Build
        env:
          DOMAIN: "example.com"
          ACME_EMAIL: "test@example.com"
        run: |
          echo "Testing Docker infrastructure..."
          docker compose build
