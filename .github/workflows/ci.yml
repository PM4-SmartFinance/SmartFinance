name: CI

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop

permissions:
  contents: write
  pull-requests: write

jobs:
  commit-msg-validation:
    name: Validate Commit Messages
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Test commit message regex (regression)
        run: bash scripts/test-commit-msg.sh

      - name: Enforce format on PR commits
        if: github.event_name == 'pull_request'
        run: |
          PATTERN=$(grep "^pattern=" .husky/commit-msg | sed "s/^pattern='//" | sed "s/'$//")
          FAILED=0
          while IFS= read -r msg; do
            [ -z "$msg" ] && continue
            case "$msg" in Merge*|Revert*) continue ;; esac
            if ! echo "$msg" | grep -qE "$PATTERN"; then
              echo "INVALID: $msg"
              FAILED=1
            fi
          done < <(git log "origin/${{ github.base_ref }}..HEAD" --format=%s)
          exit $FAILED
        shell: bash

  lint:
    name: Lint & Format
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Cache Bun download cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-cache-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-cache-${{ runner.os }}-

      - name: Install dependencies
        env:
          HUSKY: "0"
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format:check

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-24.04
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Cache Bun download cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-cache-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-cache-${{ runner.os }}-

      - name: Install dependencies
        env:
          HUSKY: "0"
        run: bun install --frozen-lockfile

      - name: Run frontend tests
        run: bun run --filter @smartfinance/frontend test:coverage

      - name: Upload frontend coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 7

  test:
    name: Backend Tests (≥70% coverage)
    runs-on: ubuntu-24.04
    needs: lint

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: smartfinance_test
          POSTGRES_USER: smartfinance
          POSTGRES_PASSWORD: smartfinance
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U smartfinance"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://smartfinance:smartfinance@localhost:5433/smartfinance_test

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Cache Bun download cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-cache-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-cache-${{ runner.os }}-

      - name: Install dependencies
        env:
          HUSKY: "0"
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun --bun run prisma generate
        working-directory: backend

      - name: Run backend tests with coverage
        run: bun run --filter @smartfinance/backend test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 7

      # NOTE: coverage reporting and badge generation has been moved to
      # the `coverage-report` job which waits for both frontend and backend
      # test jobs to complete. This avoids race conditions where frontend
      # artifacts are not yet available when the backend job posts the PR comment.

  build:
    name: Build (frontend + backend)
    runs-on: ubuntu-24.04
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Cache Bun download cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-cache-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-cache-${{ runner.os }}-

      - name: Install dependencies
        env:
          HUSKY: "0"
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: DATABASE_URL="postgresql://localhost:5432/dummy" bun --bun run prisma generate
        working-directory: backend

      - name: Build frontend
        run: bun run --filter @smartfinance/frontend build

      - name: Build backend
        run: bun run --filter @smartfinance/backend build

  docker-verify:
    name: Verify Docker Infrastructure
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify Docker Compose Build
        env:
          DOMAIN: "example.com"
          ACME_EMAIL: "test@example.com"
          POSTGRES_PASSWORD: "dummy_password"
          SESSION_SECRET: "dummy_secret"
          GF_SECURITY_ADMIN_PASSWORD: "dummy_password"
        run: |
          echo "Testing Docker infrastructure..."
          docker compose build

  coverage-report:
    name: Coverage Report
    runs-on: ubuntu-24.04
    needs:
      - test-frontend
      - test
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: artifacts/frontend

      - name: Download backend coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: artifacts/backend

      - name: Install jq and bc
        run: sudo apt-get update -qq && sudo apt-get install -y jq bc

      - name: Build coverage markdown
        run: |
          set -euo pipefail
          BACK_SUM=$(find artifacts/backend -type f -name coverage-summary.json | head -n1)
          FRONT_SUM=$(find artifacts/frontend -type f -name coverage-summary.json | head -n1)
          BACK_BASE_FILE=".coverage-baselines/backend-summary.json"
          FRONT_BASE_FILE=".coverage-baselines/frontend-summary.json"

          if [ -z "$BACK_SUM" ] || [ ! -f "$BACK_SUM" ]; then
            echo "::error::backend coverage-summary.json missing in downloaded artifact"
            ls -R artifacts/backend || true
            exit 1
          fi
          if [ -z "$FRONT_SUM" ] || [ ! -f "$FRONT_SUM" ]; then
            echo "::error::frontend coverage-summary.json missing in downloaded artifact"
            ls -R artifacts/frontend || true
            exit 1
          fi
          jq empty "$BACK_SUM" || { echo "::error::malformed $BACK_SUM"; exit 1; }
          jq empty "$FRONT_SUM" || { echo "::error::malformed $FRONT_SUM"; exit 1; }

          {
            echo "<!-- coverage-report -->"
            echo "## Test Coverage Report"
            echo ""
            echo "| Module | Current | Baseline | Delta |"
            echo "|--------|---------|----------|-------|"
          } > coverage_report.md

          BACK_CUR=$(jq -r '.total.lines.pct' "$BACK_SUM")
          FRONT_CUR=$(jq -r '.total.lines.pct' "$FRONT_SUM")

          if [ -f "$BACK_BASE_FILE" ]; then
            BACK_BASE=$(jq -r '.total.lines.pct' "$BACK_BASE_FILE")
            BACK_DELTA=$(LC_ALL=C printf "%.2f" "$(echo "$BACK_CUR - $BACK_BASE" | bc -l)")
            echo "| Backend | ${BACK_CUR}% | ${BACK_BASE}% | ${BACK_DELTA}% |" >> coverage_report.md
          else
            echo "| Backend | ${BACK_CUR}% | - | - |" >> coverage_report.md
          fi

          if [ -f "$FRONT_BASE_FILE" ]; then
            FRONT_BASE=$(jq -r '.total.lines.pct' "$FRONT_BASE_FILE")
            FRONT_DELTA=$(LC_ALL=C printf "%.2f" "$(echo "$FRONT_CUR - $FRONT_BASE" | bc -l)")
            echo "| Frontend | ${FRONT_CUR}% | ${FRONT_BASE}% | ${FRONT_DELTA}% |" >> coverage_report.md
          else
            echo "| Frontend | ${FRONT_CUR}% | - | - |" >> coverage_report.md
          fi

          {
            echo ""
            echo "<details><summary>Backend per-file coverage (lowest first)</summary>"
            echo ""
            jq -r 'to_entries[] | select(.key != "total") | [.value.lines.pct, .key] | "\(.[0])\t\(.[1])"' "$BACK_SUM" \
              | sort -n \
              | awk -F'\t' '{ printf("- **%s**: %s%%\n", $2, $1) }'
            echo ""
            echo "</details>"
            echo ""
            echo "<details><summary>Frontend per-file coverage (lowest first)</summary>"
            echo ""
            jq -r 'to_entries[] | select(.key != "total") | [.value.lines.pct, .key] | "\(.[0])\t\(.[1])"' "$FRONT_SUM" \
              | sort -n \
              | awk -F'\t' '{ printf("- **%s**: %s%%\n", $2, $1) }'
            echo ""
            echo "</details>"
          } >> coverage_report.md

      - name: Post sticky coverage comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage-report
          path: coverage_report.md

      - name: Generate badges and stage baselines (on develop push)
        if: github.ref == 'refs/heads/develop' && success()
        run: |
          set -euo pipefail
          mkdir -p .coverage-baselines
          BACK_SUM=$(find artifacts/backend -type f -name coverage-summary.json | head -n1)
          FRONT_SUM=$(find artifacts/frontend -type f -name coverage-summary.json | head -n1)
          [ -n "$BACK_SUM" ] || { echo "::error::backend coverage-summary.json missing in artifact"; exit 1; }
          [ -n "$FRONT_SUM" ] || { echo "::error::frontend coverage-summary.json missing in artifact"; exit 1; }
          cp "$BACK_SUM" .coverage-baselines/backend-summary.json
          cp "$FRONT_SUM" .coverage-baselines/frontend-summary.json
          jq empty .coverage-baselines/backend-summary.json
          jq empty .coverage-baselines/frontend-summary.json
          BACK_PCT=$(jq -r '.total.lines.pct | tostring | split(".")[0]' .coverage-baselines/backend-summary.json)
          FRONT_PCT=$(jq -r '.total.lines.pct | tostring | split(".")[0]' .coverage-baselines/frontend-summary.json)
          cat > backend-coverage-badge.svg <<EOF
          <svg xmlns="http://www.w3.org/2000/svg" width="140" height="20">
            <rect width="70" height="20" fill="#555" />
            <rect x="70" width="70" height="20" fill="#4c1" />
            <g fill="#fff" text-anchor="middle" font-family="Verdana" font-size="11">
              <text x="35" y="14">backend</text>
              <text x="105" y="14">${BACK_PCT}%</text>
            </g>
          </svg>
          EOF
          cat > frontend-coverage-badge.svg <<EOF
          <svg xmlns="http://www.w3.org/2000/svg" width="140" height="20">
            <rect width="70" height="20" fill="#555" />
            <rect x="70" width="70" height="20" fill="#4c1" />
            <g fill="#fff" text-anchor="middle" font-family="Verdana" font-size="11">
              <text x="35" y="14">frontend</text>
              <text x="105" y="14">${FRONT_PCT}%</text>
            </g>
          </svg>
          EOF

      - name: Open baseline-update PR (on develop push)
        if: github.ref == 'refs/heads/develop' && success()
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/coverage-baseline-update
          base: develop
          commit-message: "chore(ci): [KAN-140] update coverage baselines and badges"
          title: "chore(ci): [KAN-140] update coverage baselines and badges"
          body: |
            Automated coverage baseline + badge update from latest develop run (commit ${{ github.sha }}).

            Generated by the `coverage-report` job. Merge to refresh PR delta comparisons.
          labels: |
            chore
            automated
          add-paths: |
            .coverage-baselines/backend-summary.json
            .coverage-baselines/frontend-summary.json
            backend-coverage-badge.svg
            frontend-coverage-badge.svg
          delete-branch: true
