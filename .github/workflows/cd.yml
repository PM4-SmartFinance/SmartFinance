name: CD

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  schedule:
    - cron: "0 2 * * *" # Daily at 02:00 UTC from develop
  release:
    types: [published]

permissions:
  contents: read

jobs:
  sync-release:
    name: Sync develop into main
    runs-on: ubuntu-24.04
    if: github.event_name == 'release'
    permissions:
      actions: read
      contents: write
    outputs:
      skipped: ${{ steps.sync-check.outputs.skipped }}
    steps:
      - name: Verify release source and healthy develop
        id: sync-check
        uses: actions/github-script@v7
        with:
          script: |
            const release = context.payload.release;
            const releaseTag = release.tag_name;
            const targetCommitish = release.target_commitish || "";

            if (targetCommitish !== "develop") {
              core.setFailed(
                `Release ${releaseTag} targets '${targetCommitish || "(empty)"}', but this workflow only syncs releases created from develop.`,
              );
              return;
            }

            let developRef;
            try {
              ({ data: developRef } = await github.rest.git.getRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: "heads/develop",
              }));
            } catch (error) {
              core.setFailed(`Could not resolve branch 'develop': ${error.message}`);
              return;
            }

            let mainRef;
            try {
              ({ data: mainRef } = await github.rest.git.getRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: "heads/main",
              }));
            } catch (error) {
              core.setFailed(`Could not resolve branch 'main': ${error.message}`);
              return;
            }

            let releaseTagSha;
            try {
              const { data: releaseTagRef } = await github.rest.git.getRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `tags/${releaseTag}`,
              });
              releaseTagSha = releaseTagRef.object.sha;

              if (releaseTagRef.object.type === "tag") {
                const { data: tagObject } = await github.rest.git.getTag({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  tag_sha: releaseTagSha,
                });
                releaseTagSha = tagObject.object.sha;
              }
            } catch (error) {
              core.setFailed(
                `Failed to resolve tag '${releaseTag}' to a commit SHA: ${error.message}`,
              );
              return;
            }

            let workflowRuns;
            try {
              ({ data: workflowRuns } = await github.rest.actions.listWorkflowRunsForWorkflow({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: "ci.yml",
                branch: "develop",
                status: "completed",
                per_page: 1,
              }));
            } catch (error) {
              core.setFailed(
                `Failed to list CI runs for workflow 'ci.yml' on branch 'develop': ${error.message}`,
              );
              return;
            }

            const latestRun = workflowRuns.workflow_runs[0];

            if (!latestRun) {
              core.setFailed("No completed CI run was found for develop.");
              return;
            }

            if (latestRun.conclusion !== "success") {
              core.setFailed(
                `Latest CI run on develop is not green (run #${latestRun.run_number}, conclusion: ${latestRun.conclusion}).`,
              );
              return;
            }

            if (latestRun.head_sha !== developRef.object.sha) {
              core.setFailed(
                `Develop is not healthy at the release boundary. CI passed for ${latestRun.head_sha}, but develop is currently at ${developRef.object.sha}.`,
              );
              return;
            }

            if (releaseTagSha !== developRef.object.sha) {
              core.setFailed(
                `Release tag ${releaseTag} points to ${releaseTagSha}, but the healthy develop tip is ${developRef.object.sha}.`,
              );
              return;
            }

            if (mainRef.object.sha === developRef.object.sha) {
              core.info("main already matches develop — no sync required.");
              core.setOutput("skipped", "true");
              return;
            }

            try {
              await github.rest.repos.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                base: "main",
                head: "develop",
                commit_message: `Sync develop into main for release ${releaseTag}`,
              });

              core.info(`Synced develop into main for release ${releaseTag}.`);
              core.setOutput("skipped", "false");
            } catch (error) {
              if (error.status === 409) {
                core.setFailed(
                  `Merge conflict syncing develop (${developRef.object.sha}) into main (${mainRef.object.sha}) for release ${releaseTag}. Resolve conflicts manually before retrying.`,
                );
              } else {
                core.setFailed(
                  `Failed to sync develop into main for release ${releaseTag}: ${error.message} (HTTP ${error.status ?? "unknown"})`,
                );
              }
            }

  docker-ci:
    name: Build & Push Docker Images
    runs-on: ubuntu-24.04
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/backend
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Extract metadata for frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/frontend
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  docker-release:
    name: Build & Push Docker Images (release)
    runs-on: ubuntu-24.04
    if: github.event_name == 'release' && needs.sync-release.outputs.skipped != 'true'
    needs:
      - sync-release
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/backend
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Extract metadata for frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/frontend
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy-release:
    name: Deploy to Production
    runs-on: ubuntu-24.04
    needs:
      - docker-release
    if: github.event_name == 'release'
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          REF_NAME: ${{ github.ref_name }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          envs: REF_NAME
          script: |
            set -euo pipefail
            cd /opt/smartfinance
            IMAGE_TAG=$(echo "$REF_NAME" | sed 's/^[vV]//')
            [ -n "$IMAGE_TAG" ] || { echo "IMAGE_TAG is empty"; exit 1; }
            IMAGE_TAG=$IMAGE_TAG docker compose pull
            IMAGE_TAG=$IMAGE_TAG docker compose up -d --remove-orphans --scale backend=0
            IMAGE_TAG=$IMAGE_TAG docker compose run --rm backend npx prisma migrate deploy
            IMAGE_TAG=$IMAGE_TAG docker compose up -d --remove-orphans
            docker image prune -f

  docker-test:
    name: Build & Push Docker Images (develop)
    runs-on: ubuntu-24.04
    if: github.event_name == 'schedule'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/backend
          tags: |
            type=raw,value=develop

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha,scope=backend-test
          cache-to: type=gha,mode=max,scope=backend-test

      - name: Extract metadata for frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/frontend
          tags: |
            type=raw,value=develop

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha,scope=frontend-test
          cache-to: type=gha,mode=max,scope=frontend-test

  deploy-test:
    name: Deploy to Test Environment
    runs-on: ubuntu-24.04
    needs: docker-test
    if: github.event_name == 'schedule'
    environment: test
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd /opt/smartfinance-test
            IMAGE_TAG=develop docker compose pull
            IMAGE_TAG=develop docker compose up -d --remove-orphans
            IMAGE_TAG=develop docker compose exec -T backend npx prisma migrate deploy
            docker image prune -f
