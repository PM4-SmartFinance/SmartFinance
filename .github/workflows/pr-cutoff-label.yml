name: PR Cutoff Label

# Applies a "late" label when a PR is opened after the Thursday 20:00
# cutoff during sprint-review week, as defined by the SPRINT_REVIEW_DATE
# repository variable.
#
# SPRINT_REVIEW_DATE — any ISO date (YYYY-MM-DD) that falls within the
# sprint-review week.  The Thursday of that same ISO week is the cutoff.
# PRs opened on Thursday ≥ 20:00 or on Friday–Sunday of that week are
# labelled "late".  Outside sprint-review week the label is never applied.
#
# Rollout / cleanup procedure
# ────────────────────────────
# At the start of each sprint:
#   1. Go to Settings → Secrets and variables → Actions → Variables.
#   2. Edit SPRINT_REVIEW_DATE to any date within the upcoming sprint-review
#      week (e.g. the date of the sprint review meeting, YYYY-MM-DD).
#   3. No workflow change is needed — the new window activates automatically.
#   4. After the sprint-review week ends, the label stops being applied until
#      SPRINT_REVIEW_DATE is updated for the following sprint.
#
# If SPRINT_REVIEW_DATE is unset or blank the workflow exits silently without
# labelling anything, so removing the variable disables enforcement entirely.

on:
  pull_request:
    # "synchronize" intentionally omitted: the cutoff is about when a PR is
    # *opened*, not when subsequent commits are pushed.  Adding synchronize
    # would label on-time PRs that receive a commit after the cutoff.
    types: [opened, reopened]
    branches:
      # Targets develop only.  Release PRs (develop → main) are created
      # during sprint-review week and must never be labeled "late".
      - develop

permissions:
  issues: write

jobs:
  check-cutoff:
    name: Sprint-Review PR Cutoff Check
    runs-on: ubuntu-24.04
    # Never fail the PR — this job is informational only.
    continue-on-error: true
    steps:
      # ── Step 1: boundary smoke-test (just the cutoff moment) ──────────────
      - name: Smoke-test cutoff boundary
        run: |
          python3 - <<'PYEOF'
          from datetime import datetime, timedelta
          from zoneinfo import ZoneInfo

          tz             = ZoneInfo("Europe/Zurich")
          CUTOFF_WEEKDAY = 3
          CUTOFF_HOUR    = 20

          def evaluate(sprint_review_date_str: str, now: datetime) -> tuple[bool, bool]:
              sprint_date = datetime.strptime(sprint_review_date_str, "%Y-%m-%d").replace(tzinfo=tz)
              week_monday = sprint_date - timedelta(days=sprint_date.weekday())
              week_sunday = week_monday + timedelta(days=6)
              cutoff_dt   = (week_monday + timedelta(days=CUTOFF_WEEKDAY)).replace(
                                hour=CUTOFF_HOUR, minute=0, second=0, microsecond=0)
              in_window = week_monday.date() <= now.date() <= week_sunday.date()
              return in_window, in_window and now >= cutoff_dt

          SPRINT = "2026-04-20"
          cases = [
              ("Thu 19:59 — not yet late", "2026-04-23 19:59", True,  False),
              ("Thu 20:00 — cutoff",       "2026-04-23 20:00", True,  True ),
              ("out of window, Thu 21:00", "2026-03-05 21:00", False, False),
          ]
          for desc, now_str, exp_in, exp_late in cases:
              now = datetime.strptime(now_str, "%Y-%m-%d %H:%M").replace(tzinfo=tz)
              in_window, is_late = evaluate(SPRINT, now)
              assert (in_window, is_late) == (exp_in, exp_late), \
                  f"FAIL [{desc}]: got in_window={in_window} is_late={is_late}"
              print(f"  [PASS] {desc}")
          print("Smoke-test passed.")
          PYEOF

      # ── Step 2: evaluate the actual PR against the live sprint window ───────
      - name: Evaluate sprint-review cutoff
        id: cutoff
        env:
          SPRINT_REVIEW_DATE: ${{ vars.SPRINT_REVIEW_DATE }}
        run: |
          python3 - <<'PYEOF'
          import os, sys
          from datetime import datetime, timedelta
          from zoneinfo import ZoneInfo

          CUTOFF_WEEKDAY = 3   # Thursday
          CUTOFF_HOUR    = 20  # 20:00

          def write_output(key: str, value: str) -> None:
              github_output = os.environ.get("GITHUB_OUTPUT")
              if not github_output:
                  print(f"ERROR: GITHUB_OUTPUT is not set — cannot write {key}={value}", file=sys.stderr)
                  sys.exit(1)
              try:
                  with open(github_output, "a") as fh:
                      fh.write(f"{key}={value}\n")
              except OSError as exc:
                  print(f"ERROR: Failed to write {key}={value} to GITHUB_OUTPUT: {exc}", file=sys.stderr)
                  sys.exit(1)

          sprint_review_date_str = os.environ.get("SPRINT_REVIEW_DATE", "").strip()

          if not sprint_review_date_str:
              print("SPRINT_REVIEW_DATE is not configured — skipping cutoff check.")
              write_output("is_late",  "false")
              write_output("in_window", "false")
              sys.exit(0)

          tz = ZoneInfo("Europe/Zurich")

          try:
              sprint_date = datetime.strptime(sprint_review_date_str, "%Y-%m-%d").replace(tzinfo=tz)
          except ValueError:
              print(f"Invalid SPRINT_REVIEW_DATE value: {sprint_review_date_str!r} (expected YYYY-MM-DD) — skipping.")
              write_output("is_late",  "false")
              write_output("in_window", "false")
              sys.exit(0)

          try:
              week_monday = sprint_date - timedelta(days=sprint_date.weekday())
              week_sunday = week_monday + timedelta(days=6)
              cutoff_dt   = (week_monday + timedelta(days=CUTOFF_WEEKDAY)).replace(
                                hour=CUTOFF_HOUR, minute=0, second=0, microsecond=0)

              now       = datetime.now(tz=tz)
              in_window = week_monday.date() <= now.date() <= week_sunday.date()
              is_late   = in_window and (now >= cutoff_dt)

              print(f"SPRINT_REVIEW_DATE  : {sprint_review_date_str}")
              print(f"Sprint-review week  : {week_monday.date()} → {week_sunday.date()}")
              print(f"Thursday cutoff     : {cutoff_dt.strftime('%Y-%m-%d %H:%M %Z')}")
              print(f"Current time        : {now.strftime('%Y-%m-%d %H:%M %Z')}")
              print(f"In window           : {in_window}")
              print(f"Is late             : {is_late}")

              write_output("is_late",  "true" if is_late else "false")
              write_output("in_window", "true" if in_window else "false")
          except Exception as exc:
              print(f"ERROR: Unexpected failure during cutoff evaluation: {exc}", file=sys.stderr)
              sys.exit(1)
          PYEOF

      # ── Step 3: create the "late" label in the repo if it does not exist ────
      - name: Ensure late label exists
        if: steps.cutoff.outputs.is_late == 'true'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'late',
              });
            } catch (err) {
              if (err.status === 404) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: 'late',
                  color: 'd93f0b',
                  description: 'PR opened after the Thursday 20:00 sprint-review cutoff',
                });
                console.log('Created "late" label.');
              } else {
                throw err;
              }
            }

      # ── Step 4: attach the label to the PR ──────────────────────────────────
      - name: Apply late label
        if: steps.cutoff.outputs.is_late == 'true'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: ['late'],
              });
              console.log('Applied "late" label to PR #' + context.issue.number);
            } catch (err) {
              core.error(`Failed to apply "late" label to PR #${context.issue.number}: ${err.message} (status: ${err.status})`);
              throw err;
            }

      # ── Step 5: comment on the PR once (idempotent via hidden marker) ────────
      - name: Comment on late PR
        if: steps.cutoff.outputs.is_late == 'true'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const MARKER = '<!-- pr-cutoff-label:late -->';

            // Fetch all comment pages so the marker check works on PRs with
            // more than 30 comments (GitHub's default per_page).
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            if (comments.some(c => c.body && c.body.includes(MARKER))) {
              console.log('Late-PR comment already present — skipping duplicate.');
              return;
            }

            const baseRef   = context.payload.pull_request.base.ref;
            const policyUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/blob/${baseRef}/CLAUDE.md#L217`;

            const body = [
              MARKER,
              '## ⚠️ Late PR — past the Thursday 20:00 cutoff',
              '',
              'This pull request was opened **after the sprint-review week cutoff** defined in the [Git policy](' + policyUrl + ').',
              '',
              '> **Policy:** PRs must be created by **Thursday 20:00 (Europe/Zurich)** during sprint-review week.',
              '',
              '---',
              '',
              '### Updating `SPRINT_REVIEW_DATE` for the next sprint',
              '',
              '`SPRINT_REVIEW_DATE` is a repository Actions variable that pins the sprint-review week.',
              'Update it at the start of each sprint so the cutoff window advances:',
              '',
              '1. Go to **Settings → Secrets and variables → Actions → Variables**.',
              '2. Edit `SPRINT_REVIEW_DATE` to any ISO date (`YYYY-MM-DD`) that falls within the **upcoming** sprint-review week (e.g. the date of the sprint review meeting itself).',
              '3. No workflow change is needed — the new window is active on the next PR event.',
              '4. To disable enforcement entirely, delete or blank the variable.',
              '',
              'See the [Git section in CLAUDE.md](' + policyUrl + ') for the full branching and PR policy.',
            ].join('\n');

            try {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
              console.log('Posted late-PR comment.');
            } catch (err) {
              core.error(`Failed to post late-PR comment on PR #${context.issue.number}: ${err.message} (status: ${err.status})`);
              throw err;
            }
