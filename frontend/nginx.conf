server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Forward API requests to the backend container inside the Docker network
    location /api/ {
        # Resolve the upstream at request time via Docker's embedded DNS instead of
        # caching the IP for the worker's lifetime. Without this, a recreated backend
        # container (new IP on a re-run/upgrade) would keep receiving traffic at its
        # old address and serve 502s until the frontend is restarted. Referencing a
        # variable in proxy_pass forces per-request resolution.
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $backend_upstream http://backend:3000;
        proxy_pass $backend_upstream/api/;
        proxy_http_version 1.1;
        # Clear the Connection header so keep-alive to the upstream works with HTTP/1.1.
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Match the backend's 10 MB multipart import limit; nginx defaults to 1 MB,
        # which would reject a multi-MB CSV with 413 before it reaches the backend.
        client_max_body_size 10m;
        # Large CSV imports (50k-transaction target) can take a while to process;
        # raise the timeouts so long uploads are not cut off with a 504.
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Vite outputs content-hashed filenames — safe to cache for 1 year.
    location ~* \.(js|css|woff2?|png|jpg|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — all non-file routes serve index.html for React Router.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
